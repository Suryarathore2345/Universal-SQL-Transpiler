        confidence: verified
        unsupported: true
        fallback: "VARCHAR(MAX)"
      fabric_lakehouse:
        type: "STRING"
        notes: "Spark SQL has no XML type. Store as STRING and use xpath()/from_xml() functions."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
        unsupported: true
        fallback: "STRING"
      synapse:
        type: "NVARCHAR(MAX)"
        notes: "Synapse dedicated pool does not support XML type; use NVARCHAR(MAX)."
        doc_url: "https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
        confidence: verified
        unsupported: true
        fallback: "NVARCHAR(MAX)"
      oracle:
