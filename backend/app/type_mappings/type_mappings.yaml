        confidence: verified
        unsupported: true
        fallback: "STRING"
      sqlserver:
        type: "XML"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/xml/xml-transact-sql"
        confidence: verified
      fabric_dw:
        type: "VARCHAR(MAX)"
        notes: "Fabric DW does not support XML type. Use VARCHAR(MAX)."
