        notes: "Oracle XMLTYPE stores XML documents with XQuery/XPath support."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  # ── MAP ──────────────────────────────────────────────────────────────────

  MAP:
