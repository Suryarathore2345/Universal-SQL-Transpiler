        confidence: verified
      bigquery:
        type: "GEOGRAPHY"
        notes: "BigQuery only has GEOGRAPHY (not GEOMETRY). Planar geometry needs coordinate projection."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#geography_type"
        confidence: verified
      databricks:
        type: "GEOMETRY"
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "geometry"
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/spatial-geometry/spatial-types-geometry-transact-sql"
        confidence: verified
      fabric_dw:
        type: "VARBINARY"
        notes: "Fabric DW does not support geometry. Store as VARBINARY (WKB) or VARCHAR(WKT)."
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
        unsupported: true
        fallback: "VARBINARY"
      synapse:
        type: "VARBINARY"
        notes: "Synapse dedicated pool does not support geometry; use varbinary."
        doc_url: "https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
        confidence: verified
        unsupported: true
        fallback: "VARBINARY"
      oracle:
        type: "SDO_GEOMETRY"
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified


# ── Identity / Auto-Increment mechanism reference ─────────────────────────
#
# Not a data type but included here as a structural reference.
# Full syntax verified from official docs.
#
identity_mechanisms:
  redshift:
    syntax: "column_name type IDENTITY(seed, step)"
    example: "id INTEGER IDENTITY(1,1)"
    notes: "Redshift IDENTITY generates sequential values. Cannot manually INSERT into IDENTITY column without OVERRIDING SYSTEM VALUE."
    doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_CREATE_TABLE_NEW.html"
    confidence: verified

  snowflake:
    syntax: "column_name type AUTOINCREMENT | IDENTITY [(start, increment)]"
    example: "id INTEGER AUTOINCREMENT"
    notes: "Snowflake AUTOINCREMENT / IDENTITY. Default start=1, increment=1."
    doc_url: "https://docs.snowflake.com/en/sql-reference/sql/create-table"
    confidence: verified

  bigquery:
    syntax: null
    notes: "BigQuery has no native IDENTITY or sequence. Common patterns: (1) use GENERATE_UUID() as default, (2) maintain a sequence table + stored procedure, (3) use row numbering in views. All patterns require application-level logic."
    fallback_type: "STRING DEFAULT (GENERATE_UUID())"
    fallback_doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/functions-and-operators#generate_uuid"
    unsupported: true
    confidence: verified

  databricks:
    syntax: "column_name BIGINT GENERATED ALWAYS AS IDENTITY [(START WITH n INCREMENT BY n)]"
    example: "id BIGINT GENERATED ALWAYS AS IDENTITY (START WITH 1 INCREMENT BY 1)"
    notes: "Databricks GENERATED ALWAYS AS IDENTITY for Delta tables only."
    doc_url: "https://docs.databricks.com/en/delta/generated-columns.html"
    confidence: verified

  sqlserver:
    syntax: "column_name type IDENTITY(seed, increment)"
    example: "id INT IDENTITY(1,1)"
    doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/functions/identity-function-transact-sql"
    confidence: verified

  fabric_dw:
    syntax: "column_name type IDENTITY(seed, increment)"
    example: "id INT IDENTITY(1,1)"
    notes: "Fabric DW supports IDENTITY columns for INT, BIGINT, SMALLINT, DECIMAL, NUMERIC."
    doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/create-table"
    confidence: verified

  synapse:
    syntax: "column_name type IDENTITY(seed, increment)"
    example: "id INT IDENTITY(1,1)"
    doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/statements/create-table-azure-sql-data-warehouse"
    confidence: verified

  oracle:
    syntax: "column_name type GENERATED [ALWAYS | BY DEFAULT [ON NULL]] AS IDENTITY [(START WITH n INCREMENT BY n)]"
    example: "id NUMBER GENERATED ALWAYS AS IDENTITY START WITH 1 INCREMENT BY 1"
    notes: "Oracle 12c+ supports IDENTITY columns. Earlier versions require explicit sequence + trigger."
    doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-TABLE.html"
    confidence: verified
