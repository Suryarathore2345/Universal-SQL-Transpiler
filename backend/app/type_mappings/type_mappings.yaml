  # ── Identifier ────────────────────────────────────────────────────────────

  UUID:
    description: "Universally unique identifier — UUID / UNIQUEIDENTIFIER"
    dialects:
      redshift:
        type: "VARCHAR(36)"
        notes: "Redshift has no UUID type. Store as VARCHAR(36) and generate with CONCAT of random hex."
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/c_Supported_data_types.html"
        confidence: verified
        unsupported: true
        fallback: "VARCHAR(36)"
      snowflake:
        type: "VARCHAR(36)"
        aliases: ["STRING"]
        notes: "Snowflake has no UUID type; store as VARCHAR(36). Generate with UUID_STRING()."
        doc_url: "https://docs.snowflake.com/en/sql-reference/functions/uuid_string"
        confidence: verified
      bigquery:
        type: "STRING"
        notes: "BigQuery: no UUID type; use STRING and GENERATE_UUID() function."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/functions-and-operators#generate_uuid"
        confidence: verified
      databricks:
        type: "STRING"
        notes: "Databricks: no UUID type; use STRING and uuid() function."
        doc_url: "https://docs.databricks.com/en/sql/language-manual/functions/uuid.html"
        confidence: verified
      sqlserver:
        type: "UNIQUEIDENTIFIER"
        aliases: []
        notes: "SQL Server UNIQUEIDENTIFIER = 16-byte GUID. Generate with NEWID()."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/uniqueidentifier-transact-sql"
        confidence: verified
      fabric_dw:
        type: "UNIQUEIDENTIFIER"
        notes: "Fabric DW supports UNIQUEIDENTIFIER but stores as binary in Parquet."
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      synapse:
        type: "UNIQUEIDENTIFIER"
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/uniqueidentifier-transact-sql"
        confidence: verified
      oracle:
        type: "RAW(16)"
        aliases: []
        notes: "Oracle: store UUID as RAW(16) or VARCHAR2(36). Generate with SYS_GUID()."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/SYS_GUID.html"
        confidence: verified

  # ── Spatial ───────────────────────────────────────────────────────────────

  GEOGRAPHY:
    description: "Geographic spatial data (longitude/latitude on sphere)"
    dialects:
      redshift:
        type: "GEOGRAPHY"
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/c_Supported_data_types.html"
        confidence: verified
      snowflake:
        type: "GEOGRAPHY"
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-geospatial"
        confidence: verified
      bigquery:
        type: "GEOGRAPHY"
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#geography_type"
        confidence: verified
      databricks:
        type: "GEOGRAPHY"
        notes: "Databricks GEOGRAPHY type added in recent runtime versions."
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "geography"
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/spatial-geography/spatial-types-geography"
        confidence: verified
      fabric_dw:
        type: "VARBINARY"
        notes: "Fabric DW does not support geography type. Store as VARBINARY (WKB) or VARCHAR(WKT). See: https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
        unsupported: true
        fallback: "VARBINARY"
        fallback_doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
      synapse:
        type: "VARBINARY"
        notes: "Synapse dedicated pool does not support geography; use varbinary. See: https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
        doc_url: "https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
        confidence: verified
        unsupported: true
        fallback: "VARBINARY"
        fallback_doc_url: "https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
      oracle:
        type: "SDO_GEOMETRY"
        notes: "Oracle Spatial uses SDO_GEOMETRY. For geographic: use SDO_CS with SRID 4326."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  GEOMETRY:
    description: "Geometric spatial data (flat/Cartesian plane)"
    dialects:
      redshift:
        type: "GEOMETRY"
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/c_Supported_data_types.html"
