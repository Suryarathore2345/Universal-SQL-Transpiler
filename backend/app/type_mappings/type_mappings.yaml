# Universal SQL Transpiler — Type Mapping Matrix
#
# Every entry maps a GenericType (from ir/models.py) to its native representation
# in each of the 8 supported dialects.
#
# Structure per dialect entry:
#   type:        Primary/recommended type expression to EMIT when generating SQL
#   aliases:     Alternative names the PARSER should recognise from source SQL
#   max_length:  Maximum allowed length/precision (null = platform default)
#   notes:       Human-readable caveat
#   doc_url:     Official documentation page this mapping was sourced from
#   confidence:  "verified" (from official docs) | "unverified" (community source, needs human review)
#
# Sources (all verified June 2026):
#   Redshift:    https://docs.aws.amazon.com/redshift/latest/dg/c_Supported_data_types.html
#   Snowflake:   https://docs.snowflake.com/en/sql-reference/intro-summary-data-types
#   BigQuery:    https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types
#   Databricks:  https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html
#   SQL Server:  https://learn.microsoft.com/en-us/sql/t-sql/data-types/data-types-transact-sql
#   Fabric DW:   https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types
#   Synapse:     https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types
#   Oracle:      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html

generic_types:

  # ── Integers ──────────────────────────────────────────────────────────────

  INT8:
    description: "8-bit (1-byte) signed integer — TINYINT (0-255 in T-SQL, signed in others)"
    dialects:
      redshift:
        type: "INT2"
        aliases: []
        notes: "Redshift has no TINYINT; emit as INT2 (alias of SMALLINT). Widening conversion. Do not list SMALLINT here — SMALLINT source should parse as INT16."
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "TINYINT"
        aliases: ["BYTEINT", "NUMBER(3,0)"]
        notes: "Snowflake TINYINT is an alias for NUMBER(38,0); effectively stored as 38-digit precision."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "INT64"
        aliases: ["INT", "SMALLINT", "INTEGER", "BIGINT", "TINYINT", "BYTEINT"]
        notes: "BigQuery has only INT64 for all integer sizes."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#integer_type"
        confidence: verified
      databricks:
        type: "TINYINT"
        aliases: ["BYTE"]
        notes: "Databricks TINYINT is a true 1-byte signed integer."
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "TINYINT"
        aliases: []
        notes: "SQL Server TINYINT is 0-255 unsigned 1-byte."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      fabric_dw:
        type: "SMALLINT"
        aliases: []
        notes: "Fabric DW does not support TINYINT for table columns; smallest is SMALLINT. See unsupported types."
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
        unsupported: true
        fallback: "SMALLINT"
        fallback_doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
      fabric_lakehouse:
        type: "TINYINT"
        aliases: ["BYTE"]
        notes: "Spark SQL TINYINT is a true 1-byte signed integer (-128 to 127)."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "TINYINT"
        aliases: []
        notes: "Synapse dedicated SQL pool supports TINYINT."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      oracle:
        type: "NUMBER(3)"
        aliases: []
        notes: "Oracle has no TINYINT; NUMBER(3) holds 0-127. For signed byte use NUMBER(3)."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  INT16:
    description: "16-bit (2-byte) signed integer — SMALLINT"
    dialects:
      redshift:
        type: "SMALLINT"
        aliases: ["INT2"]
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "SMALLINT"
        aliases: ["NUMBER(5,0)", "INT2"]
        notes: "Snowflake SMALLINT stored as NUMBER(38,0) internally."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "INT64"
        aliases: ["INT", "SMALLINT", "INTEGER", "BIGINT", "TINYINT", "BYTEINT"]
        notes: "BigQuery uses INT64 for all integer sizes."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#integer_type"
        confidence: verified
      databricks:
        type: "SMALLINT"
        aliases: ["SHORT"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "SMALLINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      fabric_dw:
        type: "SMALLINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "SMALLINT"
        aliases: ["SHORT"]
        notes: "Spark SQL SMALLINT is a 2-byte signed integer."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "SMALLINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      oracle:
        type: "NUMBER(5)"
        aliases: ["SMALLINT"]
        notes: "Oracle SMALLINT is an ANSI alias for NUMBER(38); use NUMBER(5) for true 16-bit range."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  INT32:
    description: "32-bit (4-byte) signed integer — INT / INTEGER"
    dialects:
      redshift:
        type: "INTEGER"
        aliases: ["INT", "INT4"]
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "INTEGER"
        aliases: ["INT", "INT4", "SIGNED"]
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "INT64"
        aliases: ["INT", "INTEGER", "SMALLINT", "BIGINT", "TINYINT", "BYTEINT"]
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#integer_type"
        confidence: verified
      databricks:
        type: "INT"
        aliases: ["INTEGER"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "INT"
        aliases: ["INTEGER"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      fabric_dw:
        type: "INT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "INT"
        aliases: ["INTEGER"]
        notes: "Spark SQL INT is a 4-byte signed integer."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "INT"
        aliases: ["INTEGER"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      oracle:
        type: "NUMBER(10)"
        aliases: ["INTEGER", "INT"]
        notes: "Oracle INTEGER is an ANSI alias for NUMBER(38). Use NUMBER(10) for true 32-bit range."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  INT64:
    description: "64-bit (8-byte) signed integer — BIGINT"
    dialects:
      redshift:
        type: "BIGINT"
        aliases: ["INT8"]
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "BIGINT"
        aliases: ["NUMBER(19,0)", "INT8"]
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "INT64"
        aliases: ["INT", "INTEGER", "SMALLINT", "BIGINT", "TINYINT", "BYTEINT"]
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#integer_type"
        confidence: verified
      databricks:
        type: "BIGINT"
        aliases: ["LONG"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "BIGINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      fabric_dw:
        type: "BIGINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "BIGINT"
        aliases: ["LONG"]
        notes: "Spark SQL BIGINT is an 8-byte signed integer."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "BIGINT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/int-bigint-smallint-and-tinyint-transact-sql"
        confidence: verified
      oracle:
        type: "NUMBER(19)"
        aliases: []
        notes: "Oracle has no BIGINT; use NUMBER(19) for 64-bit signed integer range."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  # ── Exact Numeric ─────────────────────────────────────────────────────────

  DECIMAL:
    description: "Exact fixed-point numeric — DECIMAL(p,s) / NUMERIC(p,s)"
    default_precision: 18
    default_scale: 0
    dialects:
      redshift:
        type: "DECIMAL"
        aliases: ["NUMERIC"]
        max_precision: 38
        notes: "Redshift DECIMAL max precision 38."
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "NUMBER"
        aliases: ["DECIMAL", "NUMERIC"]
        max_precision: 38
        notes: "Snowflake NUMBER(p,s) max precision 38."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "NUMERIC"
        aliases: ["DECIMAL", "BIGNUMERIC"]
        max_precision: 29
        max_scale: 9
        notes: "BigQuery NUMERIC max precision 29, max scale 9. BIGNUMERIC (76,38) mapped here for parser recognition; emitted as NUMERIC."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#decimal_type"
        confidence: verified
        bignumeric_type: "BIGNUMERIC"
        bignumeric_max_precision: 76
        bignumeric_max_scale: 38
      databricks:
        type: "DECIMAL"
        aliases: ["NUMERIC", "DEC"]
        max_precision: 38
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "DECIMAL"
        aliases: ["NUMERIC", "MONEY", "SMALLMONEY"]
        max_precision: 38
        notes: "MONEY=DECIMAL(19,4), SMALLMONEY=DECIMAL(10,4). Mapped here so source MONEY types parse correctly; emitted as DECIMAL on target."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/decimal-and-numeric-transact-sql"
        confidence: verified
      fabric_dw:
        type: "DECIMAL"
        aliases: ["NUMERIC"]
        max_precision: 38
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "DECIMAL"
        aliases: ["NUMERIC", "DEC"]
        max_precision: 38
        notes: "Spark SQL DECIMAL(p,s) max precision 38."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "DECIMAL"
        aliases: ["NUMERIC", "MONEY", "SMALLMONEY"]
        max_precision: 38
        notes: "MONEY=DECIMAL(19,4), SMALLMONEY=DECIMAL(10,4). Synapse supports MONEY natively but DECIMAL is preferred for portability."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/decimal-and-numeric-transact-sql"
        confidence: verified
      oracle:
        type: "NUMBER"
        aliases: ["DECIMAL", "NUMERIC", "DEC"]
        max_precision: 38
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  # ── Floating Point ────────────────────────────────────────────────────────

  FLOAT32:
    description: "32-bit (4-byte) single-precision IEEE floating-point — REAL / FLOAT4"
    dialects:
      redshift:
        type: "REAL"
        aliases: ["FLOAT4"]
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "FLOAT"
        aliases: ["FLOAT4", "REAL"]
        notes: "Snowflake FLOAT4 is stored as 64-bit double internally; no true 32-bit float."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "FLOAT64"
        aliases: ["FLOAT"]
        notes: "BigQuery only has FLOAT64; no 32-bit float type."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#floating_point_type"
        confidence: verified
      databricks:
        type: "FLOAT"
        aliases: ["REAL"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "REAL"
        aliases: ["FLOAT(24)"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/float-and-real-transact-sql"
        confidence: verified
      fabric_dw:
        type: "REAL"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "FLOAT"
        aliases: ["REAL"]
        notes: "Spark SQL FLOAT is a 4-byte single-precision IEEE float."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "REAL"
        aliases: ["FLOAT(24)"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/float-and-real-transact-sql"
        confidence: verified
      oracle:
        type: "BINARY_FLOAT"
        aliases: []
        notes: "Oracle BINARY_FLOAT is a 32-bit IEEE single-precision float."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  FLOAT64:
    description: "64-bit (8-byte) double-precision IEEE floating-point — FLOAT / DOUBLE PRECISION"
    dialects:
      redshift:
        type: "DOUBLE PRECISION"
        aliases: ["FLOAT8", "FLOAT"]
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Numeric_types201.html"
        confidence: verified
      snowflake:
        type: "DOUBLE"
        aliases: ["DOUBLE PRECISION", "FLOAT", "FLOAT8", "REAL"]
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-numeric"
        confidence: verified
      bigquery:
        type: "FLOAT64"
        aliases: ["FLOAT"]
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#floating_point_type"
        confidence: verified
      databricks:
        type: "DOUBLE"
        aliases: ["DOUBLE PRECISION"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "FLOAT"
        aliases: ["FLOAT(53)", "DOUBLE PRECISION"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/float-and-real-transact-sql"
        confidence: verified
      fabric_dw:
        type: "FLOAT"
        aliases: []
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "DOUBLE"
        aliases: ["DOUBLE PRECISION"]
        notes: "Spark SQL DOUBLE is an 8-byte double-precision IEEE float."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "FLOAT"
        aliases: ["FLOAT(53)"]
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/float-and-real-transact-sql"
        confidence: verified
      oracle:
        type: "BINARY_DOUBLE"
        aliases: []
        notes: "Oracle BINARY_DOUBLE is a 64-bit IEEE double. FLOAT(p) is a subtype of NUMBER, not IEEE."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  # ── String ────────────────────────────────────────────────────────────────

  CHAR:
    description: "Fixed-length character string — CHAR(n)"
    dialects:
      redshift:
        type: "CHAR"
        aliases: ["CHARACTER", "NCHAR", "BPCHAR"]
        max_length: 4096
        notes: "Redshift CHAR max 4096 bytes; CHAR doesn't support multibyte."
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Character_types.html"
        confidence: verified
      snowflake:
        type: "CHAR"
        aliases: ["CHARACTER"]
        notes: "Snowflake CHAR is an alias for VARCHAR; trailing spaces not preserved."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-text"
        confidence: verified
      bigquery:
        type: "STRING"
        aliases: []
        notes: "BigQuery has no CHAR type; maps to STRING. Length constraint not enforced."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#string_type"
        confidence: verified
      databricks:
        type: "CHAR"
        aliases: ["CHARACTER"]
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "CHAR"
        aliases: ["CHARACTER", "NCHAR"]
        max_length: 8000
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/char-and-varchar-transact-sql"
        confidence: verified
      fabric_dw:
        type: "CHAR"
        aliases: ["NCHAR"]
        notes: "Fabric DW supports CHAR but not NCHAR (use CHAR with UTF-8 collation)."
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "STRING"
        aliases: ["CHAR", "CHARACTER"]
        notes: "Spark SQL maps all CHAR types to STRING. Length constraints are not enforced."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "CHAR"
        aliases: ["NCHAR"]
        max_length: 8000
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/char-and-varchar-transact-sql"
        confidence: verified
      oracle:
        type: "CHAR"
        aliases: ["NCHAR"]
        max_length: 2000
        notes: "Oracle CHAR max 2000 bytes. Uses blank-padding comparison semantics. NCHAR (Unicode fixed-length) mapped here."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  VARCHAR:
    description: "Variable-length character string with length bound — VARCHAR(n)"
    dialects:
      redshift:
        type: "VARCHAR"
        aliases: ["CHARACTER VARYING", "NVARCHAR"]
        max_length: 65535
        notes: "Redshift VARCHAR max 65535 bytes. TEXT alias moved to GenericType.TEXT entry for correct CLOB/NVARCHAR(MAX) target mappings."
        doc_url: "https://docs.aws.amazon.com/redshift/latest/dg/r_Character_types.html"
        confidence: verified
      snowflake:
        type: "VARCHAR"
        aliases: ["NVARCHAR", "CHAR VARYING"]
        max_length: 16777216
        notes: "Snowflake VARCHAR max 16MB. STRING/TEXT aliases moved to GenericType.TEXT entry. VARCHAR(n) keeps length semantics."
        doc_url: "https://docs.snowflake.com/en/sql-reference/data-types-text"
        confidence: verified
      bigquery:
        type: "STRING"
        aliases: ["VARCHAR"]
        notes: "BigQuery STRING is variable-length; no length limit. VARCHAR is an alias."
        doc_url: "https://cloud.google.com/bigquery/docs/reference/standard-sql/data-types#string_type"
        confidence: verified
      databricks:
        type: "STRING"
        aliases: ["VARCHAR", "CHAR VARYING"]
        notes: "Databricks STRING has no length limit. VARCHAR(n) is supported for compatibility."
        doc_url: "https://docs.databricks.com/en/sql/language-manual/sql-ref-datatypes.html"
        confidence: verified
      sqlserver:
        type: "VARCHAR"
        aliases: ["CHARACTER VARYING", "NVARCHAR"]
        max_length: 8000
        notes: "Use NVARCHAR for Unicode. VARCHAR(MAX) = up to 2GB."
        doc_url: "https://learn.microsoft.com/en-us/sql/t-sql/data-types/char-and-varchar-transact-sql"
        confidence: verified
      fabric_dw:
        type: "VARCHAR"
        aliases: ["NVARCHAR"]
        max_length_max: "16MB"
        notes: "Fabric DW VARCHAR(MAX) limited to 16MB. NVARCHAR not supported — use VARCHAR."
        doc_url: "https://learn.microsoft.com/en-us/fabric/data-warehouse/data-types"
        confidence: verified
      fabric_lakehouse:
        type: "STRING"
        aliases: ["VARCHAR", "CHARACTER VARYING"]
        notes: "Spark SQL STRING has no length limit. VARCHAR(n) maps to STRING (length not enforced)."
        doc_url: "https://spark.apache.org/docs/latest/sql-ref-datatypes.html"
        confidence: verified
      synapse:
        type: "VARCHAR"
        aliases: ["NVARCHAR"]
        notes: "Synapse supports NVARCHAR; prefer VARCHAR for performance per MS docs."
        doc_url: "https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/develop-tables-data-types"
        confidence: verified
      oracle:
        type: "VARCHAR2"
        aliases: ["VARCHAR", "NVARCHAR2"]
        max_length: 32767
        notes: "Oracle VARCHAR2 max 32767 (extended) / 4000 (standard MAX_STRING_SIZE). VARCHAR is deprecated alias. NVARCHAR2 (Unicode) mapped here for parser recognition."
        doc_url: "https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Data-Types.html"
        confidence: verified

  TEXT:
    description: "Unbounded / max-length character string — TEXT / VARCHAR(MAX) / CLOB"
    dialects:
      redshift:
        type: "VARCHAR(65535)"
        aliases: ["TEXT"]
        notes: "Redshift TEXT = VARCHAR(256). For max: use VARCHAR(65535)."
